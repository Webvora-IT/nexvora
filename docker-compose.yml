version: '3.8'

services:
  # ── PostgreSQL ────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: nexvora_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: nexvora_db
      POSTGRES_USER: nexvora
      POSTGRES_PASSWORD: nexvora_password
    volumes:
      - nexvora_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexvora -d nexvora_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nexvora_net

  # ── Next.js App (production build) ───────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: nexvora_app
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://nexvora:nexvora_password@postgres:5432/nexvora_db
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - nexvora_net
    # App is NOT exposed on the host — nginx is the entry point

  # ── Nginx Reverse Proxy (production) ─────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: nexvora_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      # - "443:443"   # Uncomment when SSL cert is ready
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # - ./nginx/certs:/etc/ssl/certs:ro   # SSL certs
    depends_on:
      - app
    networks:
      - nexvora_net

volumes:
  nexvora_postgres_data:

networks:
  nexvora_net:
    driver: bridge
